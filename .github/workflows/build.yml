name: Build

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake cmake-data git build-essential autoconf automake libtool texinfo bison flex pkg-config ccache
    - name: ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: downloads
      uses: actions/cache@v4
      with:
        path: build/downloads
        key: ${{ runner.os }}-downloads-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-downloads-
    - name: Build
      run: |
        git config --global user.email "builds@travis-ci.com"
        git config --global user.name "Travis CI"
        mkdir -p build
        cd build
        cmake ..
        make -j$(nproc) tarball
    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: vitasdk-linux
        path: build/*.tar.bz2
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake cmake-data git build-essential autoconf automake libtool texinfo bison flex pkg-config ccache
    - name: ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: downloads
      uses: actions/cache@v4
      with:
        path: build/downloads
        key: ${{ runner.os }}-downloads-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-downloads-
    - name: Build
      run: |
        git config --global user.email "builds@travis-ci.com"
        git config --global user.name "Travis CI"
        mkdir -p build
        cd build
        cmake ..
        make -j$(nproc) tarball
    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: vitasdk-linux-arm64
        path: build/*.tar.bz2
  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - name: Install dependencies
      run: |
        brew install autoconf automake libtool texinfo ccache
    - name: ccache
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: downloads
      uses: actions/cache@v4
      with:
        path: build/downloads
        key: ${{ runner.os }}-downloads-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-downloads-
    - name: Build
      run: |
        git config --global user.email "builds@travis-ci.com"
        git config --global user.name "Travis CI"
        mkdir -p build
        cd build
        cmake ..
        make -j$(sysctl -n hw.logicalcpu) tarball
    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: vitasdk-macos
        path: build/*.tar.bz2
  build-windows:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake cmake-data git build-essential autoconf automake libtool texinfo bison flex pkg-config g++-mingw-w64 ccache
    - name: ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-
    - name: downloads
      uses: actions/cache@v4
      with:
        path: build/downloads
        key: ${{ runner.os }}-downloads-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-downloads-
    - name: Build
      run: |
        git config --global user.email "builds@travis-ci.com"
        git config --global user.name "Travis CI"
        unset CXX
        unset CC
        mkdir -p build
        cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE=toolchain-x86_64-w64-mingw32.cmake
        make -j$(nproc) tarball
    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: vitasdk-windows
        path: build/*.tar.bz2
