# Clang configuration file for PS Vita (arm-vita-eabi)
# This file sets the default compilation flags for the vita target
# Equivalent to GCC patch: patches/gcc/0001-gcc-15.patch

# Target triple
--target=arm-vita-eabi

# Architecture settings (matching GCC configuration and CMakeLists.txt)
-march=armv7-a
-mcpu=cortex-a9
-mfpu=neon
-mfloat-abi=hard
-mthumb

# System defines (equivalent to builtin_define in arm-c.cc)
-D__vita__

# Signed char by default (equivalent to DEFAULT_SIGNED_CHAR=1 in arm.h)
-fsigned-char

# STDINT_LONG32=0: Use int/unsigned int for int32_t/uint32_t (not long)
# This is important for ABI compatibility
# In Clang, this is controlled by the target triple and data layout

# Newlib specific defines
-D_POSIX_THREADS
-D_UNIX98_THREAD_MUTEX_ATTRIBUTES

# Optimization and code generation
-ffunction-sections
-fdata-sections

# System libraries paths
-L<CFGDIR>/../lib
-L<CFGDIR>/../arm-vita-eabi/lib

# Note: Default libraries (LIB_SPEC equivalent) must be handled by the linker wrapper
# because .cfg files don't support conditional linking.
# The wrapper script should add these when linking executables:
# -lc (always, unless -shared)
# --whole-archive -lpthread --no-whole-archive (when -pthread is used)
# -lSceRtc_stub -lSceSysmem_stub -lSceKernelThreadMgr_stub
# -lSceKernelModulemgr_stub -lSceIofilemgr_stub -lSceProcessmgr_stub
# -lSceLibKernel_stub -lSceNet_stub -lSceNetCtl_stub -lSceSysmodule_stub
